# Application Configuration
app.name=Discord Music Bot
app.version=1.0.0

# Audio Configuration
audio.frame.buffer.duration=400
audio.cleanup.threshold=300000

# Command Configuration
commands.music.max.queue.size=100
commands.music.max.track.duration=7200000

# Embed Colors (Hex)
embed.color.success=0x2ECC71
embed.color.error=0xE74C3C
embed.color.info=0x3498DB
embed.color.warning=0xF39C12
embed.color.music=0x9B59B6
